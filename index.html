<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erratic Banana Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d;
    color: #f0e6d3;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .logo { font-size: 3em; margin-bottom: 10px; letter-spacing: 2px; }
  h1 {
    font-size: 2.4em;
    font-weight: 900;
    letter-spacing: 0.04em;
    color: #f9e04b;
    text-shadow: 0 0 40px #f9e04b55;
    margin-bottom: 6px;
  }
  .tagline {
    font-size: 0.95em;
    color: #aaa;
    margin-bottom: 60px;
    letter-spacing: 0.06em;
  }
  .games-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
    justify-content: center;
    max-width: 880px;
  }
  .game-card {
    background: #1a1a1a;
    border: 2px solid #333;
    border-radius: 18px;
    padding: 32px 36px;
    width: 280px;
    text-align: center;
    transition: border-color 0.2s, transform 0.15s;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .game-card:hover {
    border-color: #f4a43a;
    transform: translateY(-4px);
  }
  .game-card .icon { font-size: 2.8em; }
  .game-card .title {
    font-size: 1.2em;
    font-weight: 700;
    color: #f4a43a;
  }
  .game-card .desc {
    font-size: 0.85em;
    color: #999;
    line-height: 1.5;
  }
  .game-card .play-btn {
    margin-top: 8px;
    background: #f4a43a;
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 9px 28px;
    font-size: 0.95em;
    font-weight: 700;
    cursor: pointer;
    pointer-events: none;
  }
  .coming-soon-card {
    background: #111;
    border: 2px dashed #2a2a2a;
    border-radius: 18px;
    padding: 32px 36px;
    width: 280px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: #444;
  }
  .coming-soon-card .icon { font-size: 2.8em; filter: grayscale(1) opacity(0.4); }
  .coming-soon-card .title { font-size: 1.2em; font-weight: 700; color: #444; }
  .coming-soon-card .badge {
    font-size: 0.75em;
    letter-spacing: 0.1em;
    color: #555;
    border: 1px solid #333;
    border-radius: 20px;
    padding: 4px 12px;
  }
  footer {
    margin-top: 70px;
    font-size: 0.78em;
    color: #444;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="logo">🍌</div>
<h1>Erratic Banana Games</h1>
<p class="tagline">Small games. Big chaos.</p>

<div class="games-grid">

  <a class="game-card" href="games/donut/">
    <div class="icon">🍩</div>
    <div class="title">Donut Game 3D</div>
    <div class="desc">Tower defence on a donut battlefield. Buy donuts, defend your base, survive 30 waves — and face the boss.</div>
    <button class="play-btn">▶ Play</button>
  </a>

  <div class="coming-soon-card">
    <div class="icon">🎮</div>
    <div class="title">??? Game</div>
    <div class="badge">COMING SOON</div>
  </div>

</div>

<footer>by Noah and Matt Sperrin</footer>

</body>
</html>
